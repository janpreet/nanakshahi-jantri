name: Publish to npm

# Publishes when a version tag (v*) is pushed, or manually via workflow_dispatch.
# Uses npm Trusted Publishing (OIDC) — no token secret. One-time setup on npmjs.com:
# package "nanakshahi-jantri" -> Settings -> Trusted Publisher -> GitHub Actions:
#   repository janpreet/nanakshahi-jantri, workflow release.yml
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm publish
